<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LAYM Chat</title>
<style>
  body { margin:0; background:#0a0a0f; color:#fff; font-family:Tahoma; }
  #login { display:flex; flex-direction:column; gap:10px; padding:40px; max-width:400px; margin:100px auto; }
  input, button { padding:12px; border-radius:8px; border:none; font-size:16px; }
  input { background:#1a1a2a; color:#fff; }
  button { background:#9D4EDD; color:#fff; cursor:pointer; }
  button:hover { background:#7B2CBF; }
  #chat { display:none; height:100vh; flex-direction:column; }
  #messages { flex:1; overflow-y:auto; padding:15px; }
  #inputArea { display:flex; padding:10px; gap:10px; background:#1a1a2a; }
  #founderPanel { display:none; background:#1a0a2a; padding:15px; border:2px solid #9D4EDD; margin:10px; border-radius:12px; }
 .userList { background:#1a1a2a; padding:10px; margin:5px 0; border-radius:8px; }
</style>
</head>
<body>
<div id="login">
  <h2>LAYM Chat</h2>
  <input id="username" placeholder="اكتب اسمك">
  <input id="password" placeholder="كلمة سر الرتبة - اتركها فاضية لو ما عندك" type="password">
  <button onclick="joinRoom()">دخول بالاسم</button>
</div>

<div id="chat">
  <div id="founderPanel">
    <h3>👑 لوحة المؤس</h3>
    <button onclick="showAllRooms()">عرض الرومات</button>
    <button onclick="showAllUsers()">عرض المستخدمين</button>
    <div id="founderContent"></div>
  </div>
  <div id="messages"></div>
  <div id="inputArea">
    <input id="msgInput" placeholder="اكتب رسالتك">
    <input type="file" id="imageInput" accept="image/*" style="display:none">
    <button onclick="document.getElementById('imageInput').click()">صورة</button>
    <button onclick="sendMessage()">ارسال</button>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();
let myRank = 'member';function joinRoom() {
  const username = document.getElementById('username').value;
  const password = document.getElementById('password').value;
  if (!username) return alert('اكتب اسمك');
  socket.emit('joinRoom', { username, password });
}

socket.on('joined', (data) => {
  document.getElementById('login').style.display = 'none';
  document.getElementById('chat').style.display = 'flex';
});

socket.on('rankUpdate', (rank) => {
  myRank = rank;
  if (rank === 'founder') {
    document.getElementById('founderPanel').style.display = 'block';
  }
  if (rank!== 'member') {
    document.getElementById('imageInput').style.display = 'block';
  }
});

function sendMessage() {
  const msg = document.getElementById('msgInput').value;
  if (!msg) return;
  socket.emit('sendMessage', msg);
  document.getElementById('msgInput').value = '';
}

document.getElementById('imageInput').onchange = (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => socket.emit('sendImage', reader.result);
  reader.readAsDataURL(file);
};

socket.on('message', (data) => {
  addMessage(`${data.username}: ${data.text}`);
});

socket.on('image', (data) => {
  addMessage(`${data.username}: <img src="${data.image}" style="max-width:200px; border-radius:8px;">`);
});

function addMessage(text) {
  const div = document.createElement('div');
  div.innerHTML = text;
  div.style.padding = '8px';
  document.getElementById('messages').appendChild(div);
}

function showAllRooms() { socket.emit('founderGetData'); }
socket.on('founderData', (data) => {
  let html = '<h4>الرومات:</h4>';
  data.rooms.forEach(r => {
    html += `<div class="userList">${r.name} - ${r.usersCount} متصل</div>`;
  });
  document.getElementById('founderContent').innerHTML = html;
});
</script>
</body>
</html>
